<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Pale Apollo is a dark, industrial noise rock band from Nashville. New music coming soon."
    />
    <!-- <meta name="keywords" content="one, two, three" /> -->

    <title>Pale Apollo | Nashville Industrial Noise Rock</title>

    <!-- external CSS link -->
    <!-- normalize keeps some basic styling from browser -->
    <link rel="stylesheet" href="css/normalize.css" />
    <!-- reset starts from scratch, no built in styling at all -->
    <!-- <link rel="stylesheet" href="css/rest.css"> -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <nav class="initialNav">
        <ul class="initialNavList">
          <li>
            <a
              href="https://instagram.com/paleapolloband"
              target="_blank"
              rel="noopener noreferrer"
            >
              <img class="instagramLogo" src="instagram.png" />
            </a>
          </li>
          <li>
            <a href="mailto:paleapollo@gmail.com">
              <img class="emailLogo" src="email.png" />
            </a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="pageContainer">
        <section class="landingPageImgSection">
          <div class="logoContainer">
            <img
              class="nameLogo"
              src="PALEAPOLLO_WHITELOGO_TRANSPARENT.png"
              alt="Pale Apollo Logo"
            />
            <img
              class="pillar"
              src="PALEAPOLLO_pillar.png"
              alt="Pale Apollo Pillar Logo"
            />
          </div>
        </section>

        <section class="music">
          <section class="musicPlayer">
            <img
              class="albumArt"
              src="media/New_album_art.jpg"
              alt="album artwork"
            />
            <div class="nowPlayingTrackListContainer">
              <section class="nowPlaying">
                <h2 class="trackName">Track Name Placeholder</h2>
                <input type="range" value="0" class="progressBar" />
                <div class="controls">
                  <button class="rewindButton">
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      fill="none"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M21 16.811c0 .864-.933 1.406-1.683.977l-7.108-4.061a1.125 1.125 0 0 1 0-1.954l7.108-4.061A1.125 1.125 0 0 1 21 8.689v8.122ZM11.25 16.811c0 .864-.933 1.406-1.683.977l-7.108-4.061a1.125 1.125 0 0 1 0-1.954l7.108-4.061a1.125 1.125 0 0 1 1.683.977v8.122Z"
                      />
                    </svg>
                  </button>
                  <button class="playButton">
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      fill="none"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"
                      />
                    </svg>
                  </button>
                  <button class="fastForwardButton">
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      fill="none"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M3 8.689c0-.864.933-1.406 1.683-.977l7.108 4.061a1.125 1.125 0 0 1 0 1.954l-7.108 4.061A1.125 1.125 0 0 1 3 16.811V8.69ZM12.75 8.689c0-.864.933-1.406 1.683-.977l7.108 4.061a1.125 1.125 0 0 1 0 1.954l-7.108 4.061a1.125 1.125 0 0 1-1.683-.977V8.69Z"
                      />
                    </svg>
                  </button>
                </div>
              </section>
              <section class="trackListContainer">
                <div class="trackListing">
                  <ul>
                    <li>Kintsugi</li>
                    <li>Cope</li>
                  </ul>
                </div>
              </section>
            </div>
          </section>
          <audio id="audioPlayer"></audio>
        </section>
      </div>
    </main>
    <script type="text/javascript" src="js/main.js"></script>
  </body>
</html>
