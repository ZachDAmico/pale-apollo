<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Pale Apollo is a dark, industrial noise rock band from Nashville. New music coming soon."
    />
    <!-- <meta name="keywords" content="one, two, three" /> -->

    <title>Pale Apollo | Nashville Industrial Noise Rock</title>

    <!-- external CSS link -->
    <!-- normalize keeps some basic styling from browser -->
    <link rel="stylesheet" href="css/normalize.css" />
    <!-- reset starts from scratch, no built in styling at all -->
    <!-- <link rel="stylesheet" href="css/rest.css"> -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <nav class="initial__nav">
        <ul class="initial__nav__list">
          <li>
            <a
              href="https://instagram.com/paleapolloband"
              target="_blank"
              rel="noopener noreferrer"
            >
              <img class="instagram__logo" src="instagram.png" />
            </a>
          </li>
          <li>
            <a href="mailto:paleapollo@gmail.com">
              <img class="email__logo" src="email.png" />
            </a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="page__container">
        <section class="landing__page__img__section">
          <div class="logo__container">
            <img
              class="name__logo"
              src="PALEAPOLLO_WHITELOGO_TRANSPARENT.png"
              alt="Pale Apollo Logo"
            />
            <img
              class="pillar"
              src="PALEAPOLLO_pillar.png"
              alt="Pale Apollo Pillar Logo"
            />
          </div>
        </section>
      </div>
    </main>
    <script type="text/javascript" src="js/main.js"></script>
  </body>
</html>
